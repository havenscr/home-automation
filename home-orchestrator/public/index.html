<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22252f;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--teal:#009999;--teal-dim:#007a7a;--red:#ef4444;--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
a{color:var(--teal);text-decoration:none}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.tab-btn{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-content{display:none;padding:16px;max-width:960px;margin:0 auto}
.tab-content.active{display:block}

/* ── Common ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-active{background:var(--green);color:#000}
.badge-idle{background:var(--border);color:var(--muted)}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity 0.15s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{opacity:0.85}
.btn-teal{background:var(--teal);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:4px 8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-value{font-size:22px;font-weight:700;color:var(--teal)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
input[type=text],input[type=number],select{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;width:100%}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;border-color:var(--teal)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row>*{flex:1}
.form-group{margin-bottom:12px}

/* ── Progress ── */
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 1s linear}

/* ── Routine List ── */
.routine-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.routine-row:last-child{border-bottom:none}
.routine-info{flex:1}
.routine-name{font-weight:600;font-size:14px}
.routine-meta{color:var(--muted);font-size:12px;margin-top:2px}
.routine-actions{display:flex;gap:6px;align-items:center}
.wp-preview{display:flex;gap:3px;margin-top:6px;align-items:flex-end}
.wp-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;position:relative;flex-shrink:0}
.wp-time{font-size:9px;color:var(--muted);text-align:center;margin-top:2px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;padding:20px}
.modal h2{font-size:17px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}

/* ── Color Picker ── */
.color-mode-tabs{display:flex;gap:0;margin-bottom:10px}
.color-mode-tab{padding:6px 14px;font-size:12px;cursor:pointer;background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.color-mode-tab:first-child{border-radius:6px 0 0 6px}
.color-mode-tab:last-child{border-radius:0 6px 6px 0}
.color-mode-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.ct-slider-wrap{position:relative;height:28px;border-radius:6px;overflow:hidden;margin:8px 0}
.ct-slider-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to right,#ff8a2b,#ffb46b,#ffd4a3,#fff4e0,#f5f0ff,#cdd8ff,#a6bfff)}
.ct-slider-wrap input[type=range]{position:absolute;top:0;left:0;width:100%;height:100%;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
.ct-slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:28px;background:rgba(255,255,255,0.9);border-radius:4px;border:1px solid rgba(0,0,0,0.3)}
.hue-slider-wrap{position:relative;height:28px;border-radius:6px;overflow:hidden;margin:8px 0}
.hue-slider-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
.hue-slider-wrap input[type=range]{position:absolute;top:0;left:0;width:100%;height:100%;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
.hue-slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:28px;background:rgba(255,255,255,0.9);border-radius:4px;border:1px solid rgba(0,0,0,0.3)}
input[type=range]{-webkit-appearance:none;appearance:none;background:var(--border);height:6px;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--teal);border-radius:50%;cursor:pointer}
.color-swatch{width:48px;height:48px;border-radius:8px;border:2px solid var(--border);flex-shrink:0}
.bri-label{font-size:11px;color:var(--muted);min-width:40px;text-align:right}

/* ── Track ── */
.track-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.track-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.track-header h3{font-size:13px;font-weight:600}
.wp-row{display:flex;align-items:center;gap:10px;padding:8px;background:var(--card);border-radius:6px;margin-bottom:6px}
.wp-row .color-swatch{width:36px;height:36px;border-radius:6px}

/* ── Log ── */
.log-entry{font-family:'Fira Code',monospace;font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border)}
.log-entry .ts{color:var(--teal);margin-right:8px}
.log-entry .type{color:var(--amber);margin-right:8px;text-transform:uppercase;font-weight:600}

/* ── Sonos ── */
.speaker-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.speaker-name{font-weight:600;font-size:13px}
.speaker-state{font-size:12px;color:var(--muted)}
.speaker-playing{color:var(--green)}

/* ── Light Selector ── */
.light-selector{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:8px}
.light-group-label{font-size:11px;color:var(--teal);font-weight:600;margin:6px 0 2px;text-transform:uppercase}
.light-option{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;cursor:pointer}
.light-option input{accent-color:var(--teal)}
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</div>
  <div class="tab-btn" onclick="switchTab('routines')">Fade Routines</div>
  <div class="tab-btn" onclick="switchTab('sonos')">Sonos</div>
</div>

<!-- ═══ DASHBOARD TAB ═══ -->
<div class="tab-content active" id="tab-dashboard">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-value" id="s-routines">-</div><div class="stat-label">Routines</div></div>
    <div class="stat"><div class="stat-value" id="s-active">-</div><div class="stat-label">Active Fades</div></div>
    <div class="stat"><div class="stat-value" id="s-memory">-</div><div class="stat-label">Memory (MB)</div></div>
    <div class="stat"><div class="stat-value" id="s-uptime">-</div><div class="stat-label">Uptime</div></div>
  </div>
  <div class="card">
    <h2>Quick Actions</h2>
    <div id="quick-actions">Loading...</div>
  </div>
  <div class="card">
    <h2>Activity Log</h2>
    <div id="log-entries" style="max-height:300px;overflow-y:auto">Loading...</div>
  </div>
</div>

<!-- ═══ ROUTINES TAB ═══ -->
<div class="tab-content" id="tab-routines">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2 style="font-size:17px">Fade Routines</h2>
    <button class="btn btn-teal" onclick="openEditor()">+ New Routine</button>
  </div>
  <div id="routines-list">Loading...</div>
</div>

<!-- ═══ SONOS TAB ═══ -->
<div class="tab-content" id="tab-sonos">
  <h2 style="font-size:17px;margin-bottom:12px">Sonos Speakers</h2>
  <div id="sonos-speakers">Loading...</div>
  <h2 style="font-size:17px;margin:16px 0 12px">Music Routines</h2>
  <div id="sonos-routines">Loading...</div>
</div>

<!-- ═══ ROUTINE EDITOR MODAL ═══ -->
<div class="modal-overlay" id="editor-modal">
<div class="modal">
  <h2>
    <span id="editor-title">New Routine</span>
    <button class="btn-ghost" onclick="closeEditor()" style="font-size:20px">&times;</button>
  </h2>

  <div class="form-row">
    <div><label>Name</label><input type="text" id="ed-name" placeholder="My Fade Routine"></div>
    <div style="max-width:120px"><label>Duration (min)</label><input type="number" id="ed-duration" min="1" max="120" value="13"></div>
  </div>

  <div id="ed-tracks"></div>
  <button class="btn btn-outline btn-sm" onclick="addTrack()" style="margin-bottom:16px">+ Add Track</button>

  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-outline" onclick="closeEditor()">Cancel</button>
    <button class="btn btn-red btn-sm" id="ed-delete-btn" onclick="deleteRoutine()" style="display:none">Delete</button>
    <button class="btn btn-teal" onclick="saveRoutine()">Save Routine</button>
  </div>
</div>
</div>

<!-- ═══ WAYPOINT EDITOR MODAL ═══ -->
<div class="modal-overlay" id="wp-modal">
<div class="modal" style="max-width:480px">
  <h2>
    <span>Edit Waypoint</span>
    <button class="btn-ghost" onclick="closeWpEditor()" style="font-size:20px">&times;</button>
  </h2>

  <div class="form-row">
    <div style="max-width:100px"><label>Time (min)</label><input type="number" id="wp-time" min="0" max="120" step="0.5"></div>
    <div>
      <label>Brightness <span id="wp-bri-label" class="bri-label">1%</span></label>
      <input type="range" id="wp-bri" min="1" max="100" value="1" oninput="document.getElementById('wp-bri-label').textContent=this.value+'%';updateWpPreview()">
    </div>
  </div>

  <div class="color-mode-tabs">
    <div class="color-mode-tab active" onclick="setColorMode('ct')">Color Temp</div>
    <div class="color-mode-tab" onclick="setColorMode('color')">Color</div>
  </div>

  <div id="wp-ct-picker">
    <label>Color Temperature <span id="wp-ct-label">395 mirek (~2532K)</span></label>
    <div class="ct-slider-wrap">
      <div class="ct-slider-bg"></div>
      <input type="range" min="153" max="500" value="395" id="wp-ct" oninput="updateCtLabel();updateWpPreview()">
    </div>
  </div>

  <div id="wp-color-picker" style="display:none">
    <label>Hue <span id="wp-hue-label">0</span></label>
    <div class="hue-slider-wrap">
      <div class="hue-slider-bg"></div>
      <input type="range" min="0" max="65535" value="0" id="wp-hue" oninput="document.getElementById('wp-hue-label').textContent=Math.round(this.value/65535*360)+'deg';updateWpPreview()">
    </div>
    <label style="margin-top:8px">Saturation <span id="wp-sat-label">254</span></label>
    <input type="range" min="0" max="254" value="254" id="wp-sat" oninput="document.getElementById('wp-sat-label').textContent=this.value;updateWpPreview()" style="width:100%">
  </div>

  <div style="display:flex;align-items:center;gap:12px;margin:12px 0">
    <label style="margin:0">Preview:</label>
    <div class="color-swatch" id="wp-preview-swatch"></div>
    <button class="btn btn-outline btn-sm" onclick="testWaypoint()">Test on Light</button>
  </div>

  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-red btn-sm" onclick="deleteWaypoint()">Delete</button>
    <button class="btn btn-teal" onclick="saveWaypoint()">Save Waypoint</button>
  </div>
</div>
</div>

<script>
const API = '';
let S = { routines: [], routineDetails: {}, status: null, log: [], speakers: [], sonosRoutines: [], hueLights: null, hueGroups: null };
let editingRoutineId = null;
let editingTracks = [];
let editingWpTrackIdx = null, editingWpIdx = null;
let currentColorMode = 'ct';

// ── API Helpers ──
async function api(path, opts) {
  try { const r = await fetch(API + path, opts); return await r.json(); } catch (e) { return { ok: false, error: e.message }; }
}
function fmtTime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}

// ── Color Conversion ──
function ctToXy(mirek) {
  const k=1e6/mirek, k2=k*k, k3=k2*k;
  let x = k<=4000 ? -0.2661239e9/k3-0.2343589e6/k2+0.8776956e3/k+0.17991 : -3.0258469e9/k3+2.1070379e6/k2+0.2226347e3/k+0.24039;
  let y = k<=2222 ? -1.1063814*x*x*x-1.3481102*x*x+2.1855583*x-0.2021968 : k<=4000 ? -0.9549476*x*x*x-1.3741859*x*x+2.0913702*x-0.1674887 : 3.081758*x*x*x-5.8733867*x*x+3.75113*x-0.3700148;
  return [Math.max(0,Math.min(1,x)),Math.max(0,Math.min(1,y))];
}
function hsToXy(hue,sat) {
  const h=(hue/65535)*360, s=sat/254, v=1, c=v*s, x2=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r,g,b;
  if(h<60){r=c;g=x2;b=0}else if(h<120){r=x2;g=c;b=0}else if(h<180){r=0;g=c;b=x2}else if(h<240){r=0;g=x2;b=c}else if(h<300){r=x2;g=0;b=c}else{r=c;g=0;b=x2}
  r+=m;g+=m;b+=m;
  r=r>0.04045?Math.pow((r+0.055)/1.055,2.4):r/12.92;
  g=g>0.04045?Math.pow((g+0.055)/1.055,2.4):g/12.92;
  b=b>0.04045?Math.pow((b+0.055)/1.055,2.4):b/12.92;
  const X=r*0.664511+g*0.154324+b*0.162028, Y=r*0.283881+g*0.668433+b*0.047685, Z=r*0.000088+g*0.07231+b*0.986039;
  const sum=X+Y+Z; if(sum===0)return[0.3127,0.3291];
  return[X/sum,Y/sum];
}
function xyBriToHex(x,y,bri) {
  const z=1-x-y, Y=Math.max(0.01,bri/254), X2=(Y/Math.max(0.01,y))*x, Z2=(Y/Math.max(0.01,y))*z;
  let r=X2*1.656492-Y*0.354851-Z2*0.255038, g=-X2*0.707196+Y*1.655397+Z2*0.036152, b=X2*0.051713-Y*0.121364+Z2*1.01153;
  return '#'+[r,g,b].map(c=>{c=c<=0.0031308?12.92*c:1.055*Math.pow(Math.max(0,c),1/2.4)-0.055;return Math.max(0,Math.min(255,Math.round(c*255))).toString(16).padStart(2,'0')}).join('');
}
function wpHex(wp) {
  const c=wp.color; if(!c)return'#333';
  let xy;
  if(c.xy) xy=c.xy;
  else if(c.ct) xy=ctToXy(c.ct);
  else if(c.hs) xy=hsToXy(c.hs.hue,c.hs.sat);
  else return'#666';
  return xyBriToHex(xy[0],xy[1],Math.max(60,pctToHueBri(wp.bri)));
}

// ── Tab Switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', b.textContent.toLowerCase().includes(name.substring(0,4))));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+name));
  if (name==='sonos') loadSonos();
}

// ── Refresh ──
async function refresh() {
  const [statusRes, routinesRes, logRes] = await Promise.all([api('/api/status'), api('/api/routines'), api('/api/log?limit=30')]);
  S.status = statusRes.ok ? statusRes : null;
  S.routines = routinesRes.ok ? routinesRes.routines : [];
  S.log = logRes.ok ? logRes.entries : [];
  S.routineDetails = {};
  await Promise.all(S.routines.map(async r => { const d = await api('/api/routines/'+r.id); if(d.ok) S.routineDetails[r.id]=d; }));
  renderAll();
}
function renderAll() { renderStats(); renderQuickActions(); renderRoutinesList(); renderLog(); }

function renderStats() {
  if(!S.status) return;
  document.getElementById('s-routines').textContent=S.status.routineCount||0;
  document.getElementById('s-active').textContent=(S.status.activeRoutines||[]).length;
  document.getElementById('s-memory').textContent=S.status.memory?S.status.memory.rss:'-';
  document.getElementById('s-uptime').textContent=S.status.uptime?fmtTime(S.status.uptime):'-';
}
function renderQuickActions() {
  const el=document.getElementById('quick-actions');
  if(!S.routines.length){el.innerHTML='<div style="color:var(--muted)">No routines yet. Create one in the Fade Routines tab.</div>';return;}
  el.innerHTML=S.routines.map(r=>{
    const active=S.status&&S.status.activeRoutines&&S.status.activeRoutines.find(a=>a.id===r.id);
    let html='<div class="routine-row"><div class="routine-info"><div class="routine-name">'+r.name+' <span class="badge '+(active?'badge-active':'badge-idle')+'">'+(active?'RUNNING':'idle')+'</span></div>';
    if(active) html+='<div class="progress-bar"><div class="progress-fill" style="width:'+active.progress+'%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px">'+active.progress+'% &mdash; '+fmtTime(active.remaining)+' remaining</div>';
    html+='</div><div class="routine-actions">';
    if(active) html+='<button class="btn btn-red btn-sm" onclick="cancelRoutine(\''+r.id+'\')">Cancel</button>';
    else html+='<button class="btn btn-teal btn-sm" onclick="startRoutine(\''+r.id+'\')">Start</button>';
    html+='<button class="btn btn-outline btn-sm" onclick="startRoutine(\''+r.id+'\',2)">Test (2m)</button>';
    html+='</div></div>';
    return html;
  }).join('');
}

function renderRoutinesList() {
  const el=document.getElementById('routines-list');
  if(!S.routines.length){el.innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:40px">No routines yet. Click "+ New Routine" to create one.</div>';return;}
  el.innerHTML=S.routines.map(r=>{
    const d=S.routineDetails[r.id];
    const active=S.status&&S.status.activeRoutines&&S.status.activeRoutines.find(a=>a.id===r.id);
    let wpHtml='';
    if(d&&d.tracks){
      for(const t of d.tracks){
        if(t.type==='fade'&&t.waypoints){
          wpHtml+='<div style="font-size:11px;color:var(--muted);margin-top:4px">'+(t.lightNames||t.lights||[]).join(', ')+'</div>';
          wpHtml+='<div class="wp-preview">';
          for(const wp of t.waypoints){
            wpHtml+='<div><div class="wp-dot" style="background:'+wpHex(wp)+'"></div><div class="wp-time">'+wp.time+'m</div></div>';
          }
          wpHtml+='</div>';
        } else if(t.type==='instant') {
          wpHtml+='<div style="font-size:11px;color:var(--amber);margin-top:4px">Instant at '+t.time+'m: lights ['+(t.lights||[]).join(',')+']</div>';
        }
      }
    }
    let progressHtml='';
    if(active) progressHtml='<div class="progress-bar"><div class="progress-fill" style="width:'+active.progress+'%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px">'+active.progress+'% &mdash; '+fmtTime(active.remaining)+' remaining</div>';
    return '<div class="card"><div class="routine-row"><div class="routine-info"><div class="routine-name">'+r.name+' <span class="badge '+(active?'badge-active':'badge-idle')+'">'+(active?'RUNNING':'idle')+'</span></div>'
      +'<div class="routine-meta">'+r.duration+' min &mdash; '+r.trackCount+' track(s), '+r.lightCount+' light(s)</div>'
      +wpHtml+progressHtml
      +'</div><div class="routine-actions">'
      +(active?'<button class="btn btn-red btn-sm" onclick="cancelRoutine(\''+r.id+'\')">Cancel</button>':'<button class="btn btn-teal btn-sm" onclick="startRoutine(\''+r.id+'\')">Start</button>')
      +'<button class="btn btn-outline btn-sm" onclick="startRoutine(\''+r.id+'\',2)">Test</button>'
      +'<button class="btn btn-blue btn-sm" onclick="openEditor(\''+r.id+'\')">Edit</button>'
      +'</div></div></div>';
  }).join('');
}

function renderLog() {
  const el=document.getElementById('log-entries');
  if(!S.log||!S.log.length){el.innerHTML='<div style="color:var(--muted);padding:8px">No activity yet</div>';return;}
  el.innerHTML=S.log.slice(0,30).map(e=>{
    const ts=e.ts?new Date(e.ts).toLocaleTimeString():'';
    return '<div class="log-entry"><span class="ts">'+ts+'</span><span class="type">'+(e.type||'')+'</span>'+(e.message||e.raw||'')+'</div>';
  }).join('');
}

// ── Routine Actions ──
async function startRoutine(id, testDuration) {
  const body=testDuration?{testDuration}:{};
  await api('/api/routines/'+id+'/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  refresh();
}
async function cancelRoutine(id) { await api('/api/routines/'+id+'/cancel',{method:'POST'}); refresh(); }

// ── Hue Lights Data ──
async function loadHueLights() {
  if(S.hueLights) return;
  const [lr,gr]=await Promise.all([api('/api/hue/lights'),api('/api/hue/groups')]);
  S.hueLights=lr.ok?lr.lights:{};
  S.hueGroups=gr.ok?gr.groups:{};
}

function renderLightSelector(containerId, selectedIds) {
  const el=document.getElementById(containerId); if(!el)return;
  if(!S.hueGroups||!S.hueLights){el.innerHTML='<div style="color:var(--muted)">Loading lights...</div>';return;}
  // Group lights by room
  const roomGroups={};
  for(const[gid,g]of Object.entries(S.hueGroups)){
    if(g.type!=='Room')continue;
    roomGroups[g.name]=(g.lights||[]).map(id=>({id:parseInt(id),name:S.hueLights[id]?S.hueLights[id].name:'Light '+id}));
  }
  let html='';
  for(const[room,lights]of Object.entries(roomGroups).sort((a,b)=>a[0].localeCompare(b[0]))){
    html+='<div class="light-group-label">'+room+'</div>';
    for(const l of lights.sort((a,b)=>a.name.localeCompare(b.name))){
      const checked=selectedIds.includes(l.id)?'checked':'';
      html+='<label class="light-option"><input type="checkbox" value="'+l.id+'" '+checked+' onchange="onLightToggle(this)"> '+l.name+'</label>';
    }
  }
  el.innerHTML=html;
}

// ── Routine Editor ──
async function openEditor(routineId) {
  await loadHueLights();
  editingRoutineId=routineId||null;
  if(routineId&&S.routineDetails[routineId]){
    const r=S.routineDetails[routineId];
    document.getElementById('ed-name').value=r.name||'';
    document.getElementById('ed-duration').value=r.duration||13;
    editingTracks=JSON.parse(JSON.stringify(r.tracks||[]));
    document.getElementById('editor-title').textContent='Edit Routine';
    document.getElementById('ed-delete-btn').style.display='';
  } else {
    document.getElementById('ed-name').value='';
    document.getElementById('ed-duration').value=13;
    editingTracks=[];
    document.getElementById('editor-title').textContent='New Routine';
    document.getElementById('ed-delete-btn').style.display='none';
  }
  renderTracks();
  document.getElementById('editor-modal').classList.add('open');
}
function closeEditor() { document.getElementById('editor-modal').classList.remove('open'); }

function addTrack() {
  editingTracks.push({type:'fade',lights:[],lightNames:[],waypoints:[{time:0,bri:1,color:{xy:[0.65,0.33]}},{time:parseFloat(document.getElementById('ed-duration').value)||13,bri:100,color:{ct:300}}]});
  renderTracks();
}

function renderTracks() {
  const el=document.getElementById('ed-tracks');
  el.innerHTML=editingTracks.map((t,ti)=>{
    if(t.type==='fade'){
      const lightNames=t.lights.map(id=>S.hueLights&&S.hueLights[id]?S.hueLights[id].name:'Light '+id);
      let wpHtml=t.waypoints.map((wp,wi)=>{
        const hex=wpHex(wp);
        const colorDesc=wp.color.ct?wp.color.ct+' mirek':wp.color.xy?'xy ['+wp.color.xy.map(v=>v.toFixed(2)).join(', ')+']':wp.color.hs?'hue '+Math.round(wp.color.hs.hue/65535*360)+'deg':'?';
        return '<div class="wp-row" onclick="openWpEditor('+ti+','+wi+')" style="cursor:pointer">'
          +'<div class="color-swatch" style="background:'+hex+'"></div>'
          +'<div style="flex:1"><div style="font-size:12px"><strong>'+wp.time+'m</strong> &mdash; '+wp.bri+'% &mdash; '+colorDesc+'</div></div>'
          +'<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();testWpInline('+ti+','+wi+')" style="flex-shrink:0">Test</button>'
          +'</div>';
      }).join('');
      return '<div class="track-card"><div class="track-header"><h3>Track '+(ti+1)+': Fade</h3><div>'
        +'<button class="btn btn-outline btn-sm" onclick="addWaypoint('+ti+')">+ Waypoint</button> '
        +'<button class="btn-ghost" onclick="removeTrack('+ti+')" style="color:var(--red)">&times;</button></div></div>'
        +'<label>Lights</label><div class="light-selector" id="track-lights-'+ti+'"></div>'
        +wpHtml+'</div>';
    }
    if(t.type==='instant'){
      return '<div class="track-card"><div class="track-header"><h3>Track '+(ti+1)+': Instant On</h3>'
        +'<button class="btn-ghost" onclick="removeTrack('+ti+')" style="color:var(--red)">&times;</button></div>'
        +'<div class="form-row"><div style="max-width:100px"><label>At (min)</label><input type="number" value="'+(t.time||0)+'" onchange="editingTracks['+ti+'].time=parseFloat(this.value)"></div></div>'
        +'<label>Lights</label><div class="light-selector" id="track-lights-'+ti+'"></div>'
        +'<div class="form-row" style="margin-top:8px"><div style="max-width:100px"><label>Brightness %</label><input type="number" value="'+((t.state&&t.state.bri)||100)+'" min="1" max="100" onchange="if(!editingTracks['+ti+'].state)editingTracks['+ti+'].state={};editingTracks['+ti+'].state.bri=parseInt(this.value)"></div>'
        +'<div style="max-width:120px"><label>Color Temp</label><input type="number" value="'+((t.state&&t.state.ct)||300)+'" min="153" max="500" onchange="if(!editingTracks['+ti+'].state)editingTracks['+ti+'].state={};editingTracks['+ti+'].state.ct=parseInt(this.value)"></div></div></div>';
    }
    return '';
  }).join('');
  // Render light selectors after DOM is ready
  setTimeout(()=>{
    editingTracks.forEach((t,ti)=>{
      renderLightSelector('track-lights-'+ti, t.lights||[]);
      // Wire up checkbox changes
      const sel=document.getElementById('track-lights-'+ti);
      if(sel) sel.setAttribute('data-track',ti);
    });
  },0);
}

window.onLightToggle=function(cb){
  const sel=cb.closest('.light-selector');
  const ti=parseInt(sel.getAttribute('data-track'));
  const checked=Array.from(sel.querySelectorAll('input:checked')).map(c=>parseInt(c.value));
  editingTracks[ti].lights=checked;
  editingTracks[ti].lightNames=checked.map(id=>S.hueLights&&S.hueLights[id]?S.hueLights[id].name:'Light '+id);
};

function addTrackInstant() {
  editingTracks.push({type:'instant',lights:[],time:0,state:{on:true,bri:100,ct:300}});
  renderTracks();
}

function removeTrack(ti) { editingTracks.splice(ti,1); renderTracks(); }

function addWaypoint(ti) {
  const track=editingTracks[ti];
  const lastWp=track.waypoints[track.waypoints.length-1];
  const newTime=lastWp?(lastWp.time+2):0;
  track.waypoints.push({time:newTime,bri:lastWp?Math.min(100,lastWp.bri+10):50,color:lastWp?JSON.parse(JSON.stringify(lastWp.color)):{ct:300}});
  track.waypoints.sort((a,b)=>a.time-b.time);
  renderTracks();
}

// ── Waypoint Editor ──
function openWpEditor(ti, wi) {
  editingWpTrackIdx=ti; editingWpIdx=wi;
  const wp=editingTracks[ti].waypoints[wi];
  document.getElementById('wp-time').value=wp.time;
  document.getElementById('wp-bri').value=wp.bri;
  document.getElementById('wp-bri-label').textContent=wp.bri+'%';
  if(wp.color.ct){
    setColorMode('ct');
    document.getElementById('wp-ct').value=wp.color.ct;
    updateCtLabel();
  } else if(wp.color.hs) {
    setColorMode('color');
    document.getElementById('wp-hue').value=wp.color.hs.hue;
    document.getElementById('wp-sat').value=wp.color.hs.sat;
    document.getElementById('wp-hue-label').textContent=Math.round(wp.color.hs.hue/65535*360)+'deg';
    document.getElementById('wp-sat-label').textContent=wp.color.hs.sat;
  } else if(wp.color.xy) {
    // xy -> approximate CT or show as color mode
    setColorMode('ct');
    document.getElementById('wp-ct').value=395;
    updateCtLabel();
  }
  updateWpPreview();
  document.getElementById('wp-modal').classList.add('open');
}
function closeWpEditor() { document.getElementById('wp-modal').classList.remove('open'); }

function setColorMode(mode) {
  currentColorMode=mode;
  document.querySelectorAll('.color-mode-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase().includes(mode==='ct'?'temp':'color')));
  document.getElementById('wp-ct-picker').style.display=mode==='ct'?'':'none';
  document.getElementById('wp-color-picker').style.display=mode==='color'?'':'none';
  updateWpPreview();
}
function updateCtLabel() {
  const v=parseInt(document.getElementById('wp-ct').value);
  document.getElementById('wp-ct-label').textContent=v+' mirek (~'+Math.round(1e6/v)+'K)';
}
function getWpColor() {
  if(currentColorMode==='ct') return {ct:parseInt(document.getElementById('wp-ct').value)};
  return {hs:{hue:parseInt(document.getElementById('wp-hue').value),sat:parseInt(document.getElementById('wp-sat').value)}};
}
function updateWpPreview() {
  const color=getWpColor();
  const bri=parseInt(document.getElementById('wp-bri').value);
  let xy;
  if(color.ct) xy=ctToXy(color.ct);
  else if(color.hs) xy=hsToXy(color.hs.hue,color.hs.sat);
  const hex=xy?xyBriToHex(xy[0],xy[1],Math.max(60,pctToHueBri(bri))):'#333';
  document.getElementById('wp-preview-swatch').style.background=hex;
}
function pctToHueBri(pct){return Math.max(1,Math.min(254,Math.round(pct*2.54)));}

async function testWaypoint() {
  if(editingWpTrackIdx===null)return;
  const track=editingTracks[editingWpTrackIdx];
  if(!track.lights||!track.lights.length){alert('No lights selected for this track');return;}
  const color=getWpColor();
  const bri=pctToHueBri(parseInt(document.getElementById('wp-bri').value));
  const state={on:true,bri,transitiontime:5};
  if(color.ct) state.ct=color.ct;
  else if(color.hs){state.hue=color.hs.hue;state.sat=color.hs.sat;}
  for(const lid of track.lights){
    await api('/api/hue/lights/'+lid+'/state',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
  }
}

async function testWpInline(ti, wi) {
  const track=editingTracks[ti];
  if(!track.lights||!track.lights.length){alert('No lights selected for this track');return;}
  const wp=track.waypoints[wi];
  const bri=pctToHueBri(wp.bri);
  const state={on:true,bri,transitiontime:5};
  if(wp.color.ct) state.ct=wp.color.ct;
  else if(wp.color.hs){state.hue=wp.color.hs.hue;state.sat=wp.color.hs.sat;}
  else if(wp.color.xy){state.xy=wp.color.xy;}
  for(const lid of track.lights){
    await api('/api/hue/lights/'+lid+'/state',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
  }
}
function saveWaypoint() {
  const wp=editingTracks[editingWpTrackIdx].waypoints[editingWpIdx];
  wp.time=parseFloat(document.getElementById('wp-time').value);
  wp.bri=parseInt(document.getElementById('wp-bri').value);
  wp.color=getWpColor();
  editingTracks[editingWpTrackIdx].waypoints.sort((a,b)=>a.time-b.time);
  closeWpEditor();
  renderTracks();
}
function deleteWaypoint() {
  editingTracks[editingWpTrackIdx].waypoints.splice(editingWpIdx,1);
  closeWpEditor();
  renderTracks();
}

// ── Save/Delete Routine ──
async function saveRoutine() {
  const name=document.getElementById('ed-name').value.trim();
  const duration=parseFloat(document.getElementById('ed-duration').value);
  if(!name){alert('Name is required');return;}
  const body={name,duration,durationUnit:'minutes',tracks:editingTracks,overrideDetection:true};
  if(editingRoutineId){
    await api('/api/routines/'+editingRoutineId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  } else {
    await api('/api/routines',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...body,id:name.toLowerCase().replace(/[^a-z0-9]+/g,'_')})});
  }
  closeEditor();
  await refresh();
}
async function deleteRoutine() {
  if(!editingRoutineId)return;
  if(!confirm('Delete this routine?'))return;
  await api('/api/routines/'+editingRoutineId,{method:'DELETE'});
  closeEditor();
  await refresh();
}

// ── Sonos Tab ──
async function loadSonos() {
  const [sp,st,rt]=await Promise.all([api('/api/sonos/speakers'),api('/api/sonos/status'),api('/api/sonos/routines')]);
  renderSonosSpeakers(sp,st);
  renderSonosRoutines(rt);
}
function renderSonosSpeakers(speakers,status) {
  const el=document.getElementById('sonos-speakers');
  // Sonos Commander returns flat objects: {roomName: {ip,model,name}, ...}
  if(!speakers||speakers.error){el.innerHTML='<div class="card" style="color:var(--muted)">Could not connect to Sonos Commander</div>';return;}
  const speakerList=Object.entries(speakers).filter(([k])=>k!=='ok'&&k!=='error');
  if(!speakerList.length){el.innerHTML='<div class="card" style="color:var(--muted)">No speakers found</div>';return;}
  el.innerHTML=speakerList.map(([name,info])=>{
    const st=status&&status[name];
    const playing=st&&st.currentTrack&&st.currentTrack.title;
    const state=st?st.playbackState:'unknown';
    return '<div class="speaker-card"><div><div class="speaker-name">'+name+'</div>'
      +'<div class="speaker-state '+(state==='playing'?'speaker-playing':'')+'">'+state+(playing?' &mdash; '+playing:'')+'</div></div>'
      +'<div style="font-size:11px;color:var(--muted)">'+(info.ip||'')+'</div></div>';
  }).join('');
}
function renderSonosRoutines(data) {
  const el=document.getElementById('sonos-routines');
  // Sonos Commander /api/routines returns {routineId: {name,type,...}, ...}
  const entries=data?Object.entries(data).filter(([k,v])=>typeof v==='object'&&v.name&&v.enabled!==false):[];
  if(!entries.length){el.innerHTML='<div style="color:var(--muted)">No Sonos routines</div>';return;}
  el.innerHTML=entries.map(([id,r])=>{
    return '<div class="speaker-card"><div><div class="speaker-name">'+r.name+'</div>'
      +'<div class="speaker-state">'+r.type+(r.favorite?' &mdash; '+r.favorite:'')+'</div></div>'
      +'<button class="btn btn-teal btn-sm" onclick="triggerSonos(\''+id+'\')">Play</button></div>';
  }).join('');
}
async function triggerSonos(id) {
  await api('/api/sonos/trigger/'+id,{method:'POST'});
}

// ── Auto-refresh ──
let refreshTimer=null;
function scheduleRefresh() {
  const hasActive=S.status&&S.status.activeRoutines&&S.status.activeRoutines.length>0;
  clearTimeout(refreshTimer);
  refreshTimer=setTimeout(async()=>{await refresh();scheduleRefresh();},hasActive?5000:15000);
}
refresh().then(scheduleRefresh);
</script>
